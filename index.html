<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Cậu 8/3 ✨</title>
    <style>
        :root {
            --pink-dark: #ff1493;
            --pink-light: #ffb6c1;
            --card-bg: #fffafa;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 1. Màn hình bắt đầu */
        #start-screen {
            position: relative;
            z-index: 1000;
            text-align: center;
        }
        .btn-start {
            padding: 15px 35px;
            background: rgba(255, 182, 193, 0.2);
            border: 2px solid var(--pink-light);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1.2rem;
            transition: 0.3s;
        }

        #text-sequence {
            display: none;
            position: relative;
            z-index: 500;
            font-size: 1.5rem;
            text-align: center;
            max-width: 80%;
            color: var(--pink-light);
            text-shadow: 0 0 10px var(--pink-dark);
        }

        /* 2. Ảnh trôi ngẫu nhiên */
        #photo-float-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .floating-img {
            position: absolute;
            width: 150px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            opacity: 0.4;
            animation: floatDown linear infinite;
        }
        @keyframes floatDown {
            from { transform: translateY(-110vh) rotate(var(--rot)); }
            to { transform: translateY(110vh) rotate(var(--rot)); }
        }

        /* 3. HIỆU ỨNG THIỆP/QUYỂN VỞ */
        #main-content {
            display: none;
            position: relative;
            z-index: 1000;
            perspective: 1500px;
        }

        .book {
            position: relative;
            width: 280px;
            height: 380px;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.15, 0.45, 0.3, 1);
        }

        /* Tờ bìa (Mặt trước) */
        .cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--pink-dark);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 0 15px 15px 0; /* Bo góc bên phải */
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
            transform-origin: left; /* Quay quanh trục bên trái */
            transition: transform 1s ease;
            z-index: 10;
            cursor: pointer;
            border-left: 3px solid rgba(0,0,0,0.2); /* Tạo gáy vở */
        }

        /* Trang bên trong */
        .page-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 0 15px 15px 0;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 5;
            color: #333;
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.1);
        }

        /* Trạng thái khi mở vở */
        .book.open .cover {
            transform: rotateY(-160deg);
        }

        .cover h2 { margin: 10px 0; font-size: 1.4rem; }
        .heart-icon { font-size: 4rem; animation: beat 1s infinite; }

        #typing-text { font-size: 1.1rem; line-height: 1.6; color: #444; }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #typing-text::after {
            content: '|';
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .hint {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: var(--pink-light);
            font-size: 0.9rem;
        }

        .fade-in { animation: fadeIn 0.8s forwards; }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="start-screen">
        <button class="btn-start" onclick="startExperience()">Mở quà ngay 🎀</button>
    </div>

    <div id="text-sequence"></div>

    <div id="photo-float-container"></div>

    <div id="main-content">
        <div class="book" id="myBook">
            <div class="cover" onclick="openBook()">
                <div class="heart-icon">❤️</div>
                <h2>Gửi Cậu...</h2>
                <small>Chạm để mở quyển vở nhỏ</small>
            </div>
            <div class="page-inside" onclick="openBook()">
                <h2 style="color: var(--pink-dark); margin-top: 0;">Happy 8/3!</h2>
                <div id="typing-text"></div>
            </div>
        </div>
        <div class="hint">Bấm vào bìa để lật trang nhé</div>
    </div>

    <script>
        const phrases = [
            "Chào bạn nữ xinh xắn...",
            "Nhân ngày Quốc tế Phụ nữ 8/3",
            "Tớ có một điều bất ngờ nhỏ...",
            "Dành riêng cho cậu thôi đấy!",
            "Sẵn sàng chưa nào? ✨"
        ];

        const fullMessage = "Chúc cậu một ngày 8/3 thật hạnh phúc, luôn rạng rỡ như ánh mặt trời và gặp thật nhiều may mắn trong cuộc sống nhé! Cậu xứng đáng với những điều tốt đẹp nhất. ❤️";

        const myImages = [
            'https://picsum.photos/300/400?random=1',
            'https://picsum.photos/300/400?random=2',
            'https://picsum.photos/300/400?random=3',
            'https://picsum.photos/300/400?random=4',
            'https://picsum.photos/300/400?random=5'
        ];

        let currentPhrase = 0;
        let typingStarted = false;

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            const textEl = document.getElementById('text-sequence');
            textEl.style.display = 'block';
            runTextSequence();
        }

        function runTextSequence() {
            const textEl = document.getElementById('text-sequence');
            if (currentPhrase < phrases.length) {
                textEl.innerText = phrases[currentPhrase];
                textEl.className = 'fade-in';
                setTimeout(() => {
                    textEl.className = 'fade-out';
                    setTimeout(() => {
                        currentPhrase++;
                        runTextSequence();
                    }, 800);
                }, 2200);
            } else {
                textEl.style.display = 'none';
                showMainContent();
            }
        }

        function showMainContent() {
            document.getElementById('photo-float-container').style.display = 'block';
            document.getElementById('main-content').style.display = 'flex';
            createFloatingImages();
        }

        function createFloatingImages() {
            const container = document.getElementById('photo-float-container');
            for (let i = 0; i < 20; i++) {
                const img = document.createElement('img');
                img.src = myImages[i % myImages.length];
                img.className = 'floating-img';
                img.style.left = Math.random() * 85 + '%';
                img.style.animationDuration = (15 + Math.random() * 15) + 's';
                img.style.animationDelay = (Math.random() * -30) + 's';
                img.style.setProperty('--rot', (Math.random() - 0.5) * 40 + 'deg');
                container.appendChild(img);
            }
        }

        function openBook() {
            const book = document.getElementById('myBook');
            book.classList.toggle('open');
            
            if (book.classList.contains('open') && !typingStarted) {
                typingStarted = true;
                setTimeout(() => {
                    typeWriter(fullMessage, 0);
                }, 800);
            }
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1), 60);
            }
        }

        // Sao nền
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: 0.3});
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += s.v; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        window.onload = () => { initStars(); drawStars(); };
        window.onresize = initStars;
    </script>
</body>
</html>
